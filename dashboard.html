<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>coquette — dashboard</title>
  <link rel="icon" type="image/png" href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAACAAAAAgCAYAAABzenr0AAAAi0lEQVRYhe2WwQ3AIAgFmYkRmIAZmIEZ3IMJ3IMZmIER3IMHDRrTj6BotIfeK4E38UsIEFAAfBcA3DMzMEmSJEk/stu5t2TdAXgC2gn4A9oJ+AaGqooxRgCASpmZ731VapRSBABAKeW2A2Jm7/u+quo4owPgZANmZkrpvM4cY0QIAcaY9/GNGRLAD/AClR8GRfWf2PUAAAAASUVORK5CYII=">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#88c0a0">
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { font-family: 'Segoe UI', Arial, sans-serif; }
    .pixel-btn { font-family: 'Segoe UI', Arial, sans-serif; }
    .dash-layout {
      display: flex;
      flex: 1;
      min-height: 0;
    }
    .dash-sidebar {
      width: 220px;
      background: var(--dark2);
      border-right: 4px solid var(--border);
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex-shrink: 0;
    }
    .dash-sidebar .profile-avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: 4px solid var(--border);
      margin-bottom: 8px;
    }
    .dash-sidebar .profile-name {
      font-family: 'Segoe UI', Arial, sans-serif;
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.3;
    }
    .dash-sidebar .profile-username {
      font-family: 'Segoe UI', Arial, sans-serif;
      font-size: 12px;
      color: var(--text-dim);
      margin-bottom: 12px;
    }
    .dash-sidebar .profile-divider {
      height: 1px;
      background: var(--border);
      opacity: 0.3;
      margin: 12px 0;
    }
    .dash-main {
      flex: 1;
      padding: 32px 32px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      max-width: 700px;
    }
    .dash-topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 20px;
      background: var(--dark2);
      border-bottom: 4px solid var(--border);
    }
    .topbar-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .topbar-right {
      display: flex;
      align-items: center;
      gap: 12px;
      position: relative;
    }
    .topbar-user {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      padding: 4px 8px;
      border: 2px solid transparent;
      transition: border-color 0.2s;
    }
    .topbar-user:hover {
      border-color: var(--border);
    }
    .topbar-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 2px solid var(--border);
    }
    .topbar-dropdown {
      display: none;
      position: absolute;
      top: 100%;
      right: 0;
      margin-top: 4px;
      background: var(--dark2);
      border: 2px solid var(--border);
      min-width: 160px;
      z-index: 100;
      box-shadow: 4px 4px 0 rgba(0,0,0,0.3);
    }
    .topbar-dropdown.show {
      display: block;
    }
    .topbar-dropdown a, .topbar-dropdown button {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      padding: 10px 14px;
      background: none;
      border: none;
      color: var(--text);
      font-family: 'Segoe UI', Arial, sans-serif;
      font-size: 11px;
      cursor: pointer;
      text-align: left;
      text-decoration: none;
    }
    .topbar-dropdown a:hover, .topbar-dropdown button:hover {
      background: var(--dark3);
    }
    .topbar-dropdown .divider {
      height: 1px;
      background: var(--border);
      opacity: 0.3;
      margin: 4px 0;
    }
    .orb-box {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      border: 2px solid var(--border);
      background: var(--dark3);
      cursor: default;
    }
    .quest-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      font-size: 16px;
    }
    .quest-item:last-child { border-bottom: none; }

    .feedback-section {
      width: 100%;
      margin-top: 12px;
      border-top: 2px solid var(--border);
      padding-top: 14px;
    }
    .feedback-header {
      font-size: 10px;
      color: var(--hotpink);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .feedback-header::after {
      content: '';
      flex: 1;
      height: 2px;
      background: var(--border);
      opacity: 0.3;
    }
    #feedbackList {
      font-size: 10px;
      color: var(--text-dim);
      max-height: 220px;
      overflow-y: auto;
      text-align: left;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    #feedbackList::-webkit-scrollbar {
      width: 4px;
    }
    #feedbackList::-webkit-scrollbar-track {
      background: var(--dark3);
    }
    #feedbackList::-webkit-scrollbar-thumb {
      background: var(--border);
    }
    .fb-item {
      background: rgba(30,58,14,0.5);
      border: 1px solid rgba(124,179,66,0.2);
      border-radius: 2px;
      padding: 8px;
      transition: border-color 0.2s;
    }
    .fb-item:hover {
      border-color: rgba(124,179,66,0.5);
    }
    .fb-item-top {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 4px;
    }
    .fb-avatar {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: 1px solid var(--border);
      flex-shrink: 0;
    }
    .fb-author {
      color: var(--hotpink);
      font-size: 9px;
      font-weight: bold;
      flex-shrink: 0;
    }
    .fb-time {
      color: var(--text-dim);
      font-size: 8px;
      opacity: 0.5;
      margin-left: auto;
    }
    .fb-content {
      color: var(--text);
      font-size: 9px;
      line-height: 1.4;
      word-break: break-word;
    }

    @media (max-width: 768px) {
      .dash-topbar { padding: 10px 12px; gap: 10px; }
      .dash-topbar h2 { font-size: 12px !important; }
      .dash-layout { flex-direction: column; }
      .dash-sidebar {
        width: 100%;
        flex-direction: row;
        flex-wrap: wrap;
        justify-content: flex-start;
        align-items: center;
        padding: 12px 16px;
        border-right: none;
        border-bottom: 4px solid var(--border);
        gap: 8px 12px;
      }
      .dash-sidebar .profile-avatar { width: 48px; height: 48px; margin-bottom: 0; }
      .dash-sidebar .profile-name { font-size: 14px; }
      .dash-sidebar .profile-username { font-size: 11px; margin-bottom: 0; }
      .dash-sidebar .profile-divider { display: none; }
      .dash-sidebar .feedback-section {
        width: 100%;
        margin-top: 8px;
      }
      .fb-item { padding: 6px; }
      .dash-main { padding: 16px; }
      .orb-box { padding: 6px 10px; }
      .orb-box span:last-child { font-size: 13px !important; }
    }
  </style>
</head>
<body style="background:#0d0d1a;">
  <div class="scanlines"></div>
  <div class="pixel-grid"></div>

  <video id="bgVideo" autoplay muted loop playsinline style="position:fixed;top:50%;left:50%;min-width:100%;min-height:100%;transform:translate(-50%,-50%);object-fit:cover;z-index:0;opacity:0;transition:opacity 1s;"></video>
  <div id="toast" class="toast"></div>

  <div style="position:relative;z-index:3;min-height:100vh;display:flex;flex-direction:column;">
    <div class="dash-topbar">
      <div class="topbar-left">
        <h2 style="font-size:14px;color:var(--hotpink);">♡ coquette</h2>
        <div class="orb-box" id="orbDisplay" style="display:none;">
          <span style="font-size:12px;color:var(--mint);">○</span>
          <span style="font-size:14px;color:var(--pink);" id="orbCount">0</span>
        </div>
      </div>
      <div class="topbar-right">
        <div class="topbar-user" id="topbarUser" onclick="toggleDropdown(event)">
          <img id="topbarAvatar" class="topbar-avatar" src="" alt="">
          <span id="topbarName" style="font-size:11px;color:var(--text);"></span>
          <span style="font-size:8px;color:var(--text-dim);">▼</span>
        </div>
        <div class="topbar-dropdown" id="topbarDropdown">
          <a href="setup.html">⚙ Settings</a>
          <div class="divider"></div>
          <button onclick="logout()">✕ Logout</button>
        </div>
      </div>
    </div>

    <div class="dash-layout">
      <aside class="dash-sidebar">
        <img id="userAvatar" class="profile-avatar" src="" alt="">
        <span class="profile-name" id="userName">user</span>
        <span class="profile-username" id="userTag"></span>
        <div class="profile-divider"></div>
        <div class="feedback-section">
          <div class="feedback-header">♡ FEEDBACK</div>
          <div id="feedbackList">
            <span style="color:var(--text-dim);font-size:10px;">loading...</span>
          </div>
        </div>
      </aside>

      <main class="dash-main">
        <div class="fade-in">
          <h1 style="font-size:18px;color:var(--pink);margin-bottom:4px;">♡ QUEST DASHBOARD</h1>
          <p style="font-size:16px;color:var(--text-dim);" id="welcomeSub">start a quest session</p>
        </div>

        <div class="pixel-card fade-in fade-in-delay-1">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
            <h3 style="font-size:12px;color:var(--hotpink);">QUEST SESSION</h3>
            <span id="questStatus" style="font-size:12px;color:var(--text-dim);">inactive</span>
          </div>
          <button class="pixel-btn" id="startQuestBtn" onclick="startQuest()" style="width:100%;justify-content:center;">
            ♡ COMPLETE QUESTS
          </button>
          <div id="questProgress" style="margin-top:16px;display:none;">
            <div style="display:flex;justify-content:space-between;font-size:14px;color:var(--text-dim);margin-bottom:8px;">
              <span id="progressText">0 / 0</span>
              <span id="progressStatusText">running</span>
            </div>
            <div style="height:8px;background:var(--dark3);border:2px solid var(--border);">
              <div id="progressBar" style="height:100%;width:0%;background:var(--hotpink);transition:width 0.3s;"></div>
            </div>
            <div id="questList" style="margin-top:12px;"></div>
          </div>
        </div>

        <div class="pixel-card fade-in fade-in-delay-2" id="orbsSection" style="display:none;">
          <h3 style="font-size:12px;color:var(--hotpink);margin-bottom:8px;">ORB BALANCE</h3>
          <p style="font-size:28px;color:var(--mint);" id="orbsBig">0</p>
        </div>
      </main>
    </div>
  </div>

  <script>
    (function() {
      if (!localStorage.getItem('coquette_userId')) {
        window.location.href = '/';
        return;
      }
    })();
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js').catch(function(){});
    }
    (function() {
      var video = document.getElementById('bgVideo');
      var isMobile = window.matchMedia('(max-width: 768px)').matches;
      var src = isMobile ? 'assets/android/android_background.mp4' : 'assets/pc/pc_background.mp4';
      var source = document.createElement('source');
      source.src = src;
      source.type = 'video/mp4';
      video.appendChild(source);
      video.addEventListener('canplay', function() { video.classList.add('ready'); });
      video.play().catch(function(){});
    })();
  </script>
  <script src="js/main.js"></script>
</body>
</html>
